site_name: Подготовка к интервью
site_description: Конспект подготовки к интервью на Java backend
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: yellow
      accent: amber
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: yellow
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: ru

# Разделы конспекта добавляются сюда по мере наполнения.
nav:
  - Главная: index.md
  - Содержание: contents.md
  - Java:
      - Java Core:
          - ООП и наследование: java/core/oop-inheritance.md
          - Устройство класса: java/core/class-structure.md
          - Object, equals и hashCode: java/core/object-equals-hashcode.md
          - Строки, примитивы и обёртки: java/core/strings-primitives-wrappers.md
          - Исключения: java/core/exceptions.md
          - Дженерики: java/core/generics.md
          - null, Optional и неизменяемость: java/core/null-optional-immutability.md
          - Аннотации и рефлексия: java/core/annotations-reflection.md
          - Современная Java: java/core/modern-java.md
      - Коллекции:
          - Обзор коллекций: java/collections/overview.md
          - List: java/collections/list.md
          - Map: java/collections/map.md
          - Set: java/collections/set.md
          - Сравнение, сортировка и итерирование: java/collections/comparing-sorting-iterating.md
  - Вопросы с собеседований: interview-questions.md
